    <meta name="description" content="科技共享-智能多功能响应式导航。提供高效的搜索、云端自定义网址管理、动态天气与专属壁纸等个性化功能。">
    <meta name="keywords" content="网址导航, 科技共享, 开发者导航, 智能导航, 响应式网站, 云端同步">
    
    <title id="page-title">科技共享-智能多功能响应式导航</title>
    
    <!-- 性能优化：DNS 预解析与预连接 -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    
    <!-- Google AdSense 基础脚本 (请将 ca-pub-XXXXXXXXXXXXXXXX 替换为你的实际发布商 ID) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 日间模式 (Light) 基础样式 */
        body.theme-light {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #0f172a;
        }
        body.theme-light .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        body.theme-light .glass-input {
            background: rgba(0, 0, 0, 0.04);
            color: #000;
        }
        body.theme-light input::placeholder { color: #94a3b8; }
        body.theme-light #engine-menu { background: #ffffff; border-color: #e2e8f0; }
        body.theme-light #engine-menu button { color: #334155; }
        body.theme-light #engine-menu button:hover { background: rgba(79, 70, 229, 0.08); }

        /* 夜间模式 (Dark) 基础样式 */
        body.theme-dark {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            color: #f8fafc;
        }
        body.theme-dark .glass-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        body.theme-dark .glass-input {
            background: rgba(255, 255, 255, 0.07);
        }

        /* 自定义壁纸激活状态的遮罩 */
        body.has-custom-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        /* 全局过渡动画与网格平滑过渡支持 */
        body, .glass-card, .glass-input, #custom-links-container {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 管理员权限控制类：默认非管理员隐藏编辑元素 */
        body:not(.is-admin) .admin-only {
            display: none !important;
        }
    </style>
</head>
<body class="theme-dark font-sans antialiased selection:bg-indigo-500 selection:text-white">

    <!-- 个性化设置浮窗 -->
    <div class="fixed top-5 right-5 z-[150] relative">
        <button aria-label="个性化设置" onclick="toggleThemeMenu(event)" class="w-10 h-10 rounded-xl glass-card flex items-center justify-center text-slate-400 hover:text-indigo-500 hover:scale-105 active:scale-95 transition-all shadow-lg cursor-pointer" title="个性化设置">
            <i id="theme-icon" class="fas fa-palette text-sm"></i>
        </button>
        <div id="theme-panel" class="absolute right-0 top-full mt-2 w-60 bg-slate-900/95 border border-slate-700/80 rounded-2xl shadow-2xl hidden backdrop-blur-md p-4 space-y-3 z-[160]" onclick="event.stopPropagation()">
            <!-- 语言切换 -->
            <div class="text-[11px] font-bold text-slate-400 px-1 mb-1.5" data-i18n="langTitle">语言 / Language</div>
            <div class="flex gap-2 mb-3 border-b border-slate-800 pb-3">
                <button onclick="setLanguage('zh')" class="flex-1 py-1.5 rounded-lg bg-slate-800 text-slate-200 text-xs text-center hover:bg-slate-700 transition-colors cursor-pointer">中文</button>
                <button onclick="setLanguage('en')" class="flex-1 py-1.5 rounded-lg bg-slate-800 text-slate-200 text-xs text-center hover:bg-slate-700 transition-colors cursor-pointer">English</button>
            </div>

            <!-- 主题切换 -->
            <div class="text-[11px] font-bold text-slate-400 px-1" data-i18n="themeTitle">基础色彩模式 (本地偏好)</div>
            <div class="flex gap-2">
                <button onclick="setBaseTheme('theme-light')" class="flex-1 py-1.5 rounded-lg bg-slate-800 text-slate-200 text-xs text-center hover:bg-slate-700 transition-colors cursor-pointer flex items-center justify-center gap-1"><i class="fas fa-sun text-amber-500"></i> <span data-i18n="themeLight">日间</span></button>
                <button onclick="setBaseTheme('theme-dark')" class="flex-1 py-1.5 rounded-lg bg-slate-800 text-slate-200 text-xs text-center hover:bg-slate-700 transition-colors cursor-pointer flex items-center justify-center gap-1"><i class="fas fa-moon text-indigo-400"></i> <span data-i18n="themeDark">夜间</span></button>
            </div>
            
            <!-- 壁纸设置 (管理员) -->
            <div class="admin-only space-y-1.5 px-1 border-t border-slate-800 pt-3 mt-1">
                <div class="flex justify-between items-center">
                    <label class="text-[11px] text-slate-400 font-bold" data-i18n="bgTitle">自定义背景 (本地生效)</label>
                    <button onclick="clearCustomBg()" id="clear-bg-btn" class="text-[10px] text-red-400 hover:underline hidden" data-i18n="clearBg">清除壁纸</button>
                </div>
                <div class="flex gap-1.5">
                    <input type="text" id="custom-bg-input" data-i18n-placeholder="bgInputPlace" placeholder="输入图片网址 https://..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-2 py-1 text-xs text-slate-100 focus:outline-none focus:border-indigo-500">
                    <button onclick="applyCustomBg()" class="bg-indigo-600 text-white px-2 py-1 rounded-lg text-xs hover:bg-indigo-500 cursor-pointer shrink-0" data-i18n="applyBtn">应用</button>
                </div>
            </div>

            <!-- 退出管理 -->
            <div class="admin-only border-t border-slate-800 pt-2 mt-1">
                <button onclick="logoutAdmin()" class="w-full py-1 rounded-lg bg-red-950/40 border border-red-900/40 text-red-400 text-[11px] text-center hover:bg-red-900/40 transition-colors cursor-pointer" data-i18n="logoutBtn">退出后台管理</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-12 lg:py-20 flex flex-col items-center">
        
        <!-- 时间与问候语组件 -->
        <div class="text-center mb-10 animate-fade-in">
            <h1 id="clock" class="text-5xl lg:text-7xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 mb-2">00:00:00</h1>
            <div class="flex items-center justify-center space-x-3 text-sm md:text-base font-medium tracking-wide opacity-90">
                <span id="greeting" class="text-indigo-400">正在筹备问候语...</span>
                <span class="opacity-30">|</span>
                <span id="weather-info" class="flex items-center gap-1.5 text-emerald-400">
                    <i class="fas fa-spinner fa-spin text-xs"></i> <span data-i18n="weatherLoading">正在定位测算天气...</span>
                </span>
            </div>
        </div>

        <!-- 搜索引擎组件 -->
        <div class="w-full max-w-2xl mb-16 relative z-[100]">
            <form id="search-form" action="https://www.google.com/search" method="get" target="_blank" rel="noopener noreferrer" class="relative">
                <div class="flex items-center glass-input rounded-2xl border border-slate-700/40 shadow-2xl focus-within:border-indigo-500/80 transition-all duration-300">

                            <i class="fas fa-chevron-down text-xs opacity-50"></i>
                        </button>

                            <button type="button" onclick="selectEngine('bing')" class="w-full text-left px-4 py-2.5 hover:bg-indigo-600/20 text-sm flex items-center space-x-2 cursor-pointer"><i class="fab fa-microsoft text-teal-400"></i> <span data-i18n="enBing">必应 Bing</span></button>
                            <button type="button" onclick="selectEngine('baidu')" class="w-full text-left px-4 py-2.5 hover:bg-indigo-600/20 text-sm flex items-center space-x-2 cursor-pointer"><i class="fas fa-paw text-red-400"></i> <span data-i18n="enBaidu">百度 Baidu</span></button>
                            <button type="button" onclick="selectEngine('github')" class="w-full text-left px-4 py-2.5 hover:bg-indigo-600/20 text-sm flex items-center space-x-2 cursor-pointer"><i class="fab fa-github text-slate-400"></i> <span>GitHub</span></button>
                        </div>
                    </div>

                    <input type="text" id="search-input" name="q" data-i18n-placeholder="searchGoogle" placeholder="在 Google 中搜索..." autocomplete="off" class="w-full bg-transparent border-none py-4 px-3 focus:outline-none focus:ring-0 text-base">
                    <button type="submit" aria-label="搜索" class="mr-3 p-2.5 text-slate-400 hover:text-indigo-400 transition-colors">
                        <i class="fas fa-search text-lg"></i>
                    </button>
                </div>
            </form>
        </div>

                    <a href="https://x.com/kejigongxiang" target="_blank" rel="noopener noreferrer" class="flex items-center space-x-3 p-3 bg-slate-500/5 rounded-xl hover:bg-indigo-600/20 transition-all"><i class="fas fa-tv text-xl text-pink-400"></i> <span class="text-sm font-medium" data-i18n="linkBili">哔哩哔哩</span></a>

                    <a href="https://weibo.com" target="_blank" rel="noopener noreferrer" class="flex items-center space-x-3 p-3 bg-slate-500/5 rounded-xl hover:bg-indigo-600/20 transition-all"><i class="fab fa-weibo text-xl text-red-400"></i> <span class="text-sm font-medium" data-i18n="linkWeibo">微博</span></a>

            <div id="card-develop" class="glass-card rounded-2xl p-6 shadow-xl hover:border-purple-500/30 transition-all duration-300">

                <div class="grid grid-cols-2 gap-3">

                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-pink-400 flex items-center"><i class="fas fa-folder-plus mr-2.5"></i> <span data-i18n="cardCustom">站长推荐</span></h3>

                </div>
                <div id="custom-links-container" class="grid grid-cols-2 gap-3">
                </div>
                <div id="expand-action-wrapper" class="mt-4 pt-2 border-t border-slate-500/10 text-center hidden">
                    <button onclick="toggleExpandCustomLinks()" id="expand-btn" class="text-xs font-semibold text-pink-400 hover:text-pink-300 transition-colors cursor-pointer inline-flex items-center gap-1">
                        <span data-i18n="expandMore">展开显示更多</span> <i class="fas fa-chevron-down text-[10px]"></i>

                </div>

        </div>

        <div class="w-full relative z-10 mb-12">
            <div class="glass-card rounded-2xl p-6 shadow-xl hover:border-emerald-500/20 transition-all duration-300">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-base font-semibold text-emerald-400 flex items-center"><i class="fas fa-handshake mr-2.5"></i> <span data-i18n="cardFriend">友情链接</span></h3>
                    <button type="button" onclick="openLinkModal('friend')" class="admin-only text-xs px-2.5 py-1 bg-emerald-600/20 text-emerald-400 border border-emerald-500/20 rounded-lg hover:bg-emerald-600/40 transition-colors cursor-pointer z-[50]" data-i18n="addLocal">添加 (本地)</button>
                </div>
                <div id="friend-links-container" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-3">
                </div>
            </div>
        </div>

        <footer id="admin-trigger" ondblclick="triggerAdminLogin()" class="text-slate-500 text-xs mt-4 cursor-pointer select-none tracking-wide hover:text-indigo-400/70 transition-colors" title="后台入口 (双击 / Double Click)">

        </footer>
    </div>

    <!-- 弹窗模态框 -->
    <div id="modal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[300]" onclick="closeModalOnBlank(event)">
        <div class="bg-slate-900 border border-slate-700/80 p-6 rounded-2xl w-full max-w-sm shadow-2xl text-slate-100" onclick="event.stopPropagation()">
            <h4 id="modal-title" class="text-md font-semibold text-slate-200 mb-4 flex items-center"><i class="fas fa-link mr-2 text-indigo-400"></i><span id="modal-title-text">添加网址</span></h4>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="text-xs text-slate-400 block mb-1.5 font-medium" data-i18n="siteName">网站名称</label>
                    <input type="text" id="site-name" data-i18n-placeholder="siteNamePlace" placeholder="例如：百度" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-all">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1.5 font-medium" data-i18n="siteUrl">网站网址 (URL)</label>
                    <input type="text" id="site-url" placeholder="www.baidu.com" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-all">
                </div>
            </div>
            <div class="flex justify-end space-x-3">
                <button type="button" onclick="toggleModal(false)" class="px-4 py-2 bg-slate-800 text-slate-400 text-xs font-medium rounded-xl hover:bg-slate-700 transition-colors cursor-pointer" data-i18n="btnCancel">取消</button>
                <button type="button" onclick="saveActiveLink()" class="px-4 py-2 bg-indigo-600 text-white text-xs font-medium rounded-xl hover:bg-indigo-500 transition-colors cursor-pointer shadow-lg shadow-indigo-600/20" data-i18n="btnSave">保存站点</button>
            </div>
        </div>
    </div>

                bgTitle: "Custom Wallpaper (Local)", bgInputPlace: "Image URL https://...",
                applyBtn: "Apply", clearBg: "Clear Wallpaper", logoutBtn: "Logout Admin",
                weatherLoading: "Fetching weather...",
                enGoogle: "Google", enBing: "Bing", enBaidu: "Baidu",
                searchGoogle: "Search in Google...", searchBing: "Search in Bing...", searchBaidu: "Search in Baidu...", searchGithub: "Search in GitHub...",
                cardRec: "Recommended", cardDev: "Dev & Tools", cardCustom: "Webmaster Picks", cardFriend: "Friend Links",
                linkBlog: "TechShare Blog", linkBili: "Bilibili", linkZhihu: "Zhihu", linkWeibo: "Weibo", linkJuejin: "Juejin",
                addCloud: "Add (Cloud)", addLocal: "Add (Local)",
                expandMore: "Show More", collapseMore: "Collapse",
                footerText: "&copy; 2026 TechShare Smart Nav · Powered by Cloudflare", adminBadge: "Logged In",
                modalAddCloud: "Add Cloud Link", modalAddFriend: "Add Friend Link",
                siteName: "Site Name", siteNamePlace: "e.g., Google", siteUrl: "Site URL",
                btnCancel: "Cancel", btnSave: "Save Site",
                noCloudLinks: "No custom links yet", loadingCloud: "Loading from cloud...",
                delConfirm: "Are you sure you want to delete this cloud link?", pwdPrompt: "🔐 Enter Admin Password:", pwdSuccess: "🎉 Authenticated! Admin features unlocked.", pwdFail: "❌ Incorrect password!", logoutMsg: "🔒 Logged out safely. Read-only mode activated.",
                weatherCloudy: "Cloudy", weatherClear: "Clear", weatherRain: "Rain", weatherSnow: "Snow", weatherThunder: "Thunder", weatherDefault: "Good Weather · Clear"
            }
        };

        let currentLang = localStorage.getItem('nav_lang') || 'zh';

        function t(key) {
            return i18n[currentLang][key] || key;
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('nav_lang', lang);
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            applyLanguage();
            updateClockAndGreeting();
            renderWeather(); 
            selectEngine(currentEngineKey); // Update placeholder
            document.getElementById('theme-panel').classList.add('hidden');
        }

        function applyLanguage() {
            document.getElementById('page-title').innerText = t('pageTitle');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerHTML = t(el.getAttribute('data-i18n'));
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
            });
            loadCustomLinks(); // Re-render to update dynamic buttons
        }

        // --- 全局控制状态 ---
        let isCustomLinksExpanded = false;
        let currentModalTarget = 'custom'; 
        let currentEngineKey = 'google';

        // --- 1. 隐蔽式轻量级后台管理员鉴权模块 ---
        const ADMIN_PWD_HASH = "admin888"; 

        function checkAdminSession() {
            const isAdmin = localStorage.getItem('nav_admin_auth') === 'true';
            if (isAdmin) {
                document.body.classList.add('is-admin');
                document.getElementById('admin-badge').classList.remove('hidden');
            } else {
                document.body.classList.remove('is-admin');
                document.getElementById('admin-badge').classList.add('hidden');
            }
        }

        function triggerAdminLogin() {
            if (localStorage.getItem('nav_admin_auth') === 'true') {
                alert(currentLang === 'zh' ? "提示：您当前已处于后台管理模式，右上角调色盘已解锁专属壁纸修改权限。" : "Notice: You are already in admin mode. Wallpaper config is unlocked in the top-right palette.");
                return;
            }
            const pwd = prompt(t('pwdPrompt'));
            if (pwd === null) return;
            if (pwd === ADMIN_PWD_HASH) {
                localStorage.setItem('nav_admin_auth', 'true');
                alert(t('pwdSuccess'));
                checkAdminSession();
            } else {
                alert(t('pwdFail'));
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('nav_admin_auth');
            alert(t('logoutMsg'));
            isCustomLinksExpanded = false; 
            checkAdminSession();
            document.getElementById('theme-panel').classList.add('hidden');
        }

        // --- 2. 主题与壁纸控制 ---
        function initTheme() {
            const savedTheme = localStorage.getItem('nav_theme_mode') || 'theme-dark';
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add(savedTheme);

            const savedBg = localStorage.getItem('nav_custom_wallpaper');
            if (savedBg) {
                applyWallpaperStyles(savedBg);
                document.getElementById('custom-bg-input').value = savedBg;
                document.getElementById('clear-bg-btn').classList.remove('hidden');
            }
        }

        function toggleThemeMenu(e) {
            e.stopPropagation();
            document.getElementById('theme-panel').classList.toggle('hidden');
        }

        function setBaseTheme(themeName) {
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add(themeName);
            localStorage.setItem('nav_theme_mode', themeName);
            document.getElementById('theme-panel').classList.add('hidden');
        }

        function applyCustomBg() {
            const url = document.getElementById('custom-bg-input').value.trim();
            if (!url) return alert(currentLang === 'zh' ? '提示：请输入有效的网址！' : 'Please enter a valid URL!');
            applyWallpaperStyles(url);
            localStorage.setItem('nav_custom_wallpaper', url);
            document.getElementById('clear-bg-btn').classList.remove('hidden');
            document.getElementById('theme-panel').classList.add('hidden');
        }

        function applyWallpaperStyles(url) {
            document.body.style.backgroundImage = `url('${url}')`;
            document.body.style.backgroundPosition = 'center';
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundRepeat = 'no-repeat';
            document.body.style.backgroundAttachment = 'fixed';
            document.body.classList.add('has-custom-bg');
        }

        function clearCustomBg() {
            document.body.style.backgroundImage = '';
            document.body.classList.remove('has-custom-bg');
            localStorage.removeItem('nav_custom_wallpaper');
            document.getElementById('custom-bg-input').value = '';
            document.getElementById('clear-bg-btn').classList.add('hidden');
            document.getElementById('theme-panel').classList.add('hidden');
        }

        // --- 3. 智能问候语系统 ---
        const sTermNames = ["小寒", "大寒", "立春", "雨水", "惊蛰", "春分", "清明", "谷雨", "立夏", "小满", "芒种", "夏至", "小暑", "大暑", "立秋", "处暑", "白露", "秋分", "寒露", "霜降", "立冬", "小雪", "大雪", "冬至"];
        const sTermInfo = [0, 21208, 42467, 63836, 85337, 107014, 128867, 150921, 173149, 195551, 218072, 240693, 263343, 285989, 308563, 331033, 353350, 375494, 397447, 419210, 440795, 462224, 483532, 504758];

        function getSolarTerm(y, m, d) {
            const baseDate = new Date(1900, 0, 6, 2, 5, 0);
            const termDate = new Date((31556925974.7 * (y - 1900) + sTermInfo[(m * 2)]) + baseDate.getTime());
            if (termDate.getMonth() == m && termDate.getDate() == d) return sTermNames[m * 2];
            const termDate2 = new Date((31556925974.7 * (y - 1900) + sTermInfo[(m * 2 + 1)]) + baseDate.getTime());
            if (termDate2.getMonth() == m && termDate2.getDate() == d) return sTermNames[m * 2 + 1];
            return null;
        }

        function getFestival(m, d) {
            const md = `${String(m+1).padStart(2, '0')}${String(d).padStart(2, '0')}`;
            const fests = { "0101": "元旦快乐", "0308": "妇女节快乐", "0501": "五一劳动节", "0601": "儿童节快乐", "1001": "国庆节快乐", "1225": "圣诞节" };
            return fests[md] || null;
        }

        function updateClockAndGreeting() {
            const now = new Date();
            const y = now.getFullYear(), m = now.getMonth(), d = now.getDate(), h = now.getHours();
            document.getElementById('clock').innerText = `${String(h).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

            let greetStr = "";
            if (currentLang === 'zh') {
                const term = getSolarTerm(y, m, d);
                const fest = getFestival(m, d);
                if (fest) greetStr = `🎉 今天是 ${fest}，祝你开心！`;
                else if (term) greetStr = `🍃 今日节气 · 【${term}】，顺应四时，平安喜乐。`;
                else {
                    if (h >= 0 && h < 5) greetStr = "🌙 夜深了，静谧的星空在守护你，早点休息哦";
                    else if (h >= 5 && h < 8) greetStr = "🌅 清晨的朝阳刚刚升起，新的一天充满希望";
                    else if (h >= 8 && h < 11.5) greetStr = "☀️ 早上好，专注当下，今天也要元气满满";
                    else if (h >= 11.5 && h < 13.5) greetStr = "🍲 中午好，记得按时吃饭，歇息一下双眼";
                    else if (h >= 13.5 && h < 17.5) greetStr = "☕ 下午好，来杯清茶或咖啡，继续保持高效";
                    else if (h >= 17.5 && h < 19.5) greetStr = "🌇 傍晚好，落日余晖很美，放下疲惫准备享受夜晚吧";
                    else greetStr = "✨ 晚上好，属于自己的惬意时光，好好犒劳一下自己";
                }
            } else {
                if (h >= 0 && h < 5) greetStr = "🌙 Late night, the stars are watching over you. Sleep early.";
                else if (h >= 5 && h < 8) greetStr = "🌅 The morning sun is rising, a new day full of hope.";
                else if (h >= 8 && h < 11.5) greetStr = "☀️ Good morning! Stay focused and full of energy.";
                else if (h >= 11.5 && h < 13.5) greetStr = "🍲 Good noon! Remember to eat on time and rest your eyes.";
                else if (h >= 13.5 && h < 17.5) greetStr = "☕ Good afternoon! Grab a tea or coffee and keep it up.";
                else if (h >= 17.5 && h < 19.5) greetStr = "🌇 Good evening! The sunset is beautiful. Relax and enjoy.";
                else greetStr = "✨ Good night! Enjoy your cozy time and treat yourself well.";
            }
            document.getElementById('greeting').innerText = greetStr;
        }
        setInterval(updateClockAndGreeting, 1000);

        // --- 4. 优化后的多语言智能天气定位 ---
        let weatherState = { city: "Earth", temp: 26, code: 0, fetched: false };

        async function fetchWeather() {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                if(!ipRes.ok) throw new Error();
                const ipData = await ipRes.json();
                
                const { latitude, longitude, city } = ipData;
                if(!latitude || !longitude) throw new Error();

                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                const weatherData = await weatherRes.json();
                
                weatherState = {
                    city: city || "Earth",
                    temp: Math.round(weatherData.current_weather.temperature),
                    code: weatherData.current_weather.weathercode,
                    fetched: true
                };
            } catch (e) {
                weatherState.fetched = false;
            }
            renderWeather();
        }

        function renderWeather() {
            const el = document.getElementById('weather-info');
            if (!weatherState.fetched) {
                el.innerHTML = `<i class="fas fa-cloud text-slate-400"></i> <span>${t('weatherDefault')}</span>`;
                return;
            }

            // 处理城市名称国际化映射
            let displayCity = weatherState.city;
            if (currentLang === 'zh') {
                const cityMap = {
                    "Singapore": "新加坡", "Santa Clara": "圣克拉拉", "San Jose": "圣何塞", 
                    "Beijing": "北京", "Shanghai": "上海", "Shenzhen": "深圳", 
                    "Guangzhou": "广州", "Hangzhou": "杭州", "Chengdu": "成都", "Hong Kong": "香港"
                };
                displayCity = cityMap[displayCity] || displayCity;
                displayCity = displayCity.replace(/Province|City/gi, "").trim();
            }

            // 处理天气图标及描述
            const code = weatherState.code;
            let icon = 'fa-cloud'; let descKey = 'weatherCloudy';
            if (code === 0) { icon = 'fa-sun text-amber-500'; descKey = 'weatherClear'; }
            else if ([1, 2, 3].includes(code)) { icon = 'fa-cloud-sun text-indigo-300'; descKey = 'weatherCloudy'; }
            else if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) { icon = 'fa-cloud-showers-heavy text-sky-400'; descKey = 'weatherRain'; }
            else if ([71, 73, 75, 77, 85, 86].includes(code)) { icon = 'fa-snowflake text-blue-200'; descKey = 'weatherSnow'; }
            else if ([95, 96, 99].includes(code)) { icon = 'fa-bolt text-yellow-500'; descKey = 'weatherThunder'; }

            el.innerHTML = `<i class="fas ${icon}"></i> <span>${displayCity} · ${t(descKey)} ${weatherState.temp}°C</span>`;
        }

        // --- 5. 搜索引擎选择 ---
        const engines = {
            google: { action: 'https://www.google.com/search', name: 'q', placeholderKey: 'searchGoogle', icon: 'fab fa-google text-blue-400' },
            bing: { action: 'https://cn.bing.com/search', name: 'q', placeholderKey: 'searchBing', icon: 'fab fa-microsoft text-teal-400' },
            baidu: { action: 'https://www.baidu.com/s', name: 'wd', placeholderKey: 'searchBaidu', icon: 'fas fa-paw text-red-400' },
            github: { action: 'https://github.com/search', name: 'q', placeholderKey: 'searchGithub', icon: 'fab fa-github text-slate-400' }
        };

        function toggleEngineMenu(e) { e.stopPropagation(); document.getElementById('engine-menu').classList.toggle('hidden'); }

        function selectEngine(key) {
            currentEngineKey = key;
            const form = document.getElementById('search-form');
            const input = document.getElementById('search-input');
            const icon = document.getElementById('engine-icon');
            
            form.action = engines[key].action;
            input.name = engines[key].name;
            
            // i18n applied to placeholder
            input.setAttribute('data-i18n-placeholder', engines[key].placeholderKey);
            input.placeholder = t(engines[key].placeholderKey);
            
            icon.className = engines[key].icon;
            document.getElementById('engine-menu').classList.add('hidden');
        }

        // --- 6. 链接管理 (云端与本地) ---
        function openLinkModal(target) {
            currentModalTarget = target;
            const textEl = document.getElementById('modal-title-text');
            if(target === 'friend') {
                textEl.innerText = t('modalAddFriend');
            } else {
                textEl.innerText = t('modalAddCloud');
            }
            toggleModal(true);
        }

        function toggleModal(show) {
            const modal = document.getElementById('modal');
            if (show) {
                document.getElementById('site-name').value = '';
                document.getElementById('site-url').value = '';
                modal.classList.remove('hidden');
            } else { modal.classList.add('hidden'); }
        }

        function closeModalOnBlank(e) { if(e.target.id === 'modal') toggleModal(false); }

        async function saveActiveLink() {
            const name = document.getElementById('site-name').value.trim();
            let url = document.getElementById('site-url').value.trim();
            if(!name || !url) return alert(currentLang === 'zh' ? '请完整填写名称和网址！' : 'Please fill in both name and URL!');
            if(!/^https?:\/\//i.test(url)) url = 'https://' + url;

            if(currentModalTarget === 'friend') {
                const links = JSON.parse(localStorage.getItem('nav_friend_links') || '[]');
                links.push({ name, url });
                localStorage.setItem('nav_friend_links', JSON.stringify(links));
                loadFriendLinks();
            } else {
                try {
                    const res = await fetch('/api/links');
                    let links = res.ok ? await res.json() : JSON.parse(localStorage.getItem('nav_custom_links') || '[]');
                    links.push({ name, url });
                    await fetch('/api/links', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(links) });
                    localStorage.setItem('nav_custom_links', JSON.stringify(links)); // Backup
                    loadCustomLinks();
                } catch (error) {
                    const links = JSON.parse(localStorage.getItem('nav_custom_links') || '[]');
                    links.push({ name, url });
                    localStorage.setItem('nav_custom_links', JSON.stringify(links));
                    loadCustomLinks();
                }
            }
            toggleModal(false);
        }

        async function loadCustomLinks() {
            const container = document.getElementById('custom-links-container');
            const actionWrapper = document.getElementById('expand-action-wrapper');
            const mainGrid = document.getElementById('main-nav-grid');
            const customCard = document.getElementById('card-custom');
            
            container.innerHTML = `<div class="col-span-full text-center text-xs text-slate-400/60 py-10"><i class="fas fa-spinner fa-spin"></i> ${t('loadingCloud')}</div>`;
            
            let links = [];
            try {
                const res = await fetch('/api/links');
                if(res.ok) links = await res.json();
                else throw new Error();
            } catch(e) {
                links = JSON.parse(localStorage.getItem('nav_custom_links') || '[]');
            }
            
            container.innerHTML = '';
            if(links.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-xs text-slate-400/60 py-10">${t('noCloudLinks')}</div>`;
                actionWrapper.classList.add('hidden');
                resetCustomLayout(mainGrid, customCard, container);
                return;
            }

            if (links.length > 6 && isCustomLinksExpanded) {
                mainGrid.classList.remove('xl:grid-cols-3'); mainGrid.classList.add('xl:grid-cols-4');
                customCard.classList.remove('xl:col-span-1'); customCard.classList.add('xl:col-span-2');
                container.classList.remove('grid-cols-2'); container.classList.add('grid-cols-2', 'sm:grid-cols-3');
            } else {
                resetCustomLayout(mainGrid, customCard, container);
            }

            const visibleLinks = (links.length > 6 && !isCustomLinksExpanded) ? links.slice(0, 6) : links;

            visibleLinks.forEach((item, index) => {
                let displayIcon = `<div class="w-5 h-5 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center text-[10px] font-bold shrink-0">${item.name.charAt(0).toUpperCase()}</div>`;
                try {
                    if(item.url) displayIcon = `<img src="https://unavatar.io/duckduckgo/${new URL(item.url).hostname}" onerror="this.style.display='none'" class="w-5 h-5 rounded object-contain shrink-0" alt="icon" />`;
                } catch(err){}
                container.innerHTML += `
                    <div class="group relative flex items-center justify-between p-3 bg-slate-500/5 border border-slate-500/10 rounded-xl hover:bg-indigo-600/10 transition-all">
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="flex items-center space-x-2.5 truncate w-full pr-5">
                            ${displayIcon} <span class="text-sm font-medium truncate">${item.name}</span>
                        </a>
                        <button type="button" onclick="deleteCustomLink(event, ${index})" class="admin-only absolute right-2 text-slate-400 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity text-xs bg-slate-500/20 p-1 rounded cursor-pointer"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
            });

            if (links.length > 6) {
                actionWrapper.classList.remove('hidden');
                const btn = document.getElementById('expand-btn');
                btn.innerHTML = isCustomLinksExpanded 
                    ? `<span data-i18n="collapseMore">${t('collapseMore')}</span> <i class="fas fa-chevron-up text-[10px]"></i>` 
                    : `<span data-i18n="expandMore">${t('expandMore')}</span> (${links.length - 6}) <i class="fas fa-chevron-down text-[10px]"></i>`;
            } else { actionWrapper.classList.add('hidden'); }
        }

        function resetCustomLayout(mainGrid, customCard, container) {
            mainGrid.classList.remove('xl:grid-cols-4'); mainGrid.classList.add('xl:grid-cols-3');
            customCard.classList.remove('xl:col-span-2'); customCard.classList.add('xl:col-span-1');
            container.classList.remove('sm:grid-cols-3'); container.classList.add('grid-cols-2');
        }

        function toggleExpandCustomLinks() { isCustomLinksExpanded = !isCustomLinksExpanded; loadCustomLinks(); }

        async function deleteCustomLink(e, index) {
            e.preventDefault(); e.stopPropagation();
            if(!confirm(t('delConfirm'))) return;
            try {
                const res = await fetch('/api/links');
                let links = res.ok ? await res.json() : JSON.parse(localStorage.getItem('nav_custom_links') || '[]');
                links.splice(index, 1);
                await fetch('/api/links', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(links) });
                localStorage.setItem('nav_custom_links', JSON.stringify(links));
                if(links.length <= 6) isCustomLinksExpanded = false;
                loadCustomLinks();
            } catch(error) {
                const links = JSON.parse(localStorage.getItem('nav_custom_links') || '[]');
                links.splice(index, 1);
                localStorage.setItem('nav_custom_links', JSON.stringify(links));
                if(links.length <= 6) isCustomLinksExpanded = false;
                loadCustomLinks();
            }
        }

        function loadFriendLinks() {
            const container = document.getElementById('friend-links-container');
            const links = JSON.parse(localStorage.getItem('nav_friend_links') || '[]');
            container.innerHTML = '';
            if(links.length === 0) {
                localStorage.setItem('nav_friend_links', JSON.stringify([
                    { name: "IT头条博客", url: "https://it-toutiao.blogspot.com" },
                    { name: "科技共享导航", url: "https://kjgx.168668520.xyz" }
                ]));
                return loadFriendLinks();
            }
            links.forEach((item, index) => {
                container.innerHTML += `
                    <div class="group relative flex items-center justify-between p-2.5 bg-slate-500/5 border border-slate-500/10 rounded-xl hover:bg-emerald-600/10 transition-all text-center">
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="w-full text-xs font-medium text-slate-400 hover:text-emerald-400 transition-colors truncate px-2">${item.name}</a>
                        <button type="button" onclick="deleteFriendLink(event, ${index})" class="admin-only absolute right-1 text-[10px] text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-500/10 px-1 rounded cursor-pointer"><i class="fas fa-times"></i></button>
                    </div>`;
            });
        }

        function deleteFriendLink(e, index) {
            e.preventDefault(); e.stopPropagation();
            const links = JSON.parse(localStorage.getItem('nav_friend_links') || '[]');
            links.splice(index, 1);
            localStorage.setItem('nav_friend_links', JSON.stringify(links));
            loadFriendLinks();
        }

        // --- 全局初始化 ---
        document.addEventListener('click', () => {
            document.getElementById('engine-menu').classList.add('hidden');
            document.getElementById('theme-panel').classList.add('hidden');
        });

        checkAdminSession();
        initTheme();
        document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        applyLanguage();
        updateClockAndGreeting();
        fetchWeather();
        loadFriendLinks();
    </script>
</body>
</html>
